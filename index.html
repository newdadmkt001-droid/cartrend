<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cartrend · 신차장기렌트를 가장 합리적으로</title>
  <meta name="description" content="초기비용 0원, 신차 즉시 출고. 경차부터 수입차까지 월 렌트료로 부담 없이 타는 신차장기렌트 전문 브랜드 cartrend." />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <header class="header" id="header">
    <div class="container header__inner">
      <a href="#top" class="logo" aria-label="Cartrend 홈">
        <span class="logo__tag">장기렌트 전문</span>
        <span class="logo__text"><b>Car</b>trend</span>
      </a>

      <nav class="nav" id="nav">
        <a href="#cars">차량보기</a>
      </nav>

      <div class="header__actions">
        <a href="tel:15880000" class="btn btn--ghost btn--sm">전화상담</a>
        <a href="#cars" class="btn btn--primary btn--sm">차량보기</a>
      </div>
    </div>
  </header>

  <main id="top">

    <!-- ===================== [1] 검색 (가장 상단) ===================== -->
    <div class="msearch" id="hero">
      <div class="container">
        <form class="msearch__bar" id="searchBar" role="search">
          <input type="text" id="searchInput" autocomplete="off"
                 placeholder="차량명, 브랜드를 입력하세요." aria-label="차량 검색" />
          <button type="submit" class="msearch__btn" aria-label="검색">
            <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="M20 20l-3.2-3.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </form>
      </div>
    </div>

    <!-- ===================== [2] 메인 프로모션 슬라이더 ===================== -->
    <section class="promo">
      <div class="promo__viewport">
        <div class="promo__track" id="heroTrack"></div>
      </div>
      <div class="promo__pager">
        <button class="promo__nav" id="heroPrev" aria-label="이전">‹</button>
        <span class="promo__count"><b id="heroCur">1</b> / <span id="heroTotal">0</span></span>
        <button class="promo__nav" id="heroNext" aria-label="다음">›</button>
      </div>
    </section>


    <!-- ===================== [3] 제조사 별 차량 → 차 ===================== -->
    <section class="section" id="cars">
      <div class="container">
        <div class="cars__head reveal">
          <h2 class="cars__title">브랜드 · 모델</h2>
          <button class="cars__all" id="brandAll">전체보기</button>
        </div>

        <!-- 제조사 로고 행 -->
        <div class="brandrow reveal" id="bestTabs"></div>

        <!-- 정렬 -->
        <div class="cars__sort">
          <span class="cars__cnt" id="carsCount"></span>
          <label class="sortsel">
            <select id="sortSel">
              <option value="recommend">추천순</option>
              <option value="latest">최신 등록순</option>
              <option value="priceAsc">낮은 가격순</option>
              <option value="priceDesc">높은 가격순</option>
              <option value="popular">인기순</option>
            </select>
          </label>
        </div>

        <!-- 차량 리스트 -->
        <div class="llist" id="bestCards"></div>

        <!-- 더 보기 CTA -->
        <div class="cars__more" id="moreWrap">
          <button class="btn btn--line btn--lg" id="moreBtn">Cartrend 차량 더 보기</button>
        </div>
      </div>
    </section>

  </main>

  <!-- ===================== [10] FOOTER ===================== -->
  <footer class="footer">
    <div class="container">
      <div class="footer__head">
        <span class="logo logo--footer">
          <span class="logo__tag">장기렌트 전문</span>
          <span class="logo__text"><b>Car</b>trend</span>
        </span>
        <div class="footer__sns">
          <a href="https://www.instagram.com/cartrend.kr/" target="_blank" rel="noopener" aria-label="Cartrend 인스타그램">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="1.2" fill="currentColor" stroke="none"/></svg>
          </a>
        </div>
      </div>

      <div class="footer__meta">
        <p class="footer__org">
          <span>(주)카트렌드</span>
          <span>대표자 홍길동</span>
          <span>사업자등록번호 000-00-00000</span>
          <a href="#">이용약관</a>
          <a href="#">개인정보처리방침</a>
        </p>
        <p class="footer__addr">주소 (06000) 서울특별시 강남구 테헤란로 000, 0층</p>
      </div>

      <div class="footer__box">
        <span class="footer__box-label">고객센터</span>
        <strong class="footer__box-val">1588-0000</strong>
        <span class="footer__box-hours">평일 09:00 ~ 18:00</span>
      </div>

      <p class="footer__copy">Copyright(c) Cartrend. All Rights Reserved.</p>
    </div>
  </footer>

  <!-- ===================== FLOATING RESERVE BUTTON (desktop) ===================== -->
  <a href="#cars" class="fab" id="fab" aria-label="차량 보기">
    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 13l2-7h14l2 7M5 13h14v5H5z M7 18v2M17 18v2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>차량보기</span>
  </a>

  <!-- ===================== MOBILE BOTTOM TAB BAR ===================== -->
  <nav class="tabbar" aria-label="모바일 메뉴">
    <a href="#hero" class="tabbar__item is-active" id="tabHome">
      <svg viewBox="0 0 24 24"><path d="M4 11l8-7 8 7M6 10v9h12v-9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span>홈</span>
    </a>
    <a href="#cars" class="tabbar__item">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-3.2-3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>차량검색</span>
    </a>
    <a href="tel:15880000" class="tabbar__item tabbar__item--cta">
      <span class="tabbar__cta">
        <svg viewBox="0 0 24 24"><path d="M4 5h16v11H8l-4 4z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      </span>
      <span>상담신청</span>
    </a>
    <a href="#cars" class="tabbar__item">
      <svg viewBox="0 0 24 24"><path d="M13 2L4 14h6l-1 8 9-12h-6z" fill="currentColor"/></svg>
      <span>단독특가</span>
    </a>
    <a href="#faq" class="tabbar__item">
      <svg viewBox="0 0 24 24"><path d="M4 5h16v11H7l-3 3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span>자주묻는질문</span>
    </a>
  </nav>

  <script src="db.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
