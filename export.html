<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 카탈로그 내보내기</title>
<style>
 body{font-family:"Pretendard",system-ui,sans-serif;background:#F7F8FA;color:#1A2332;max-width:680px;margin:0 auto;padding:40px 20px;line-height:1.6}
 .box{background:#fff;border:1px solid #E6E9EE;border-radius:14px;padding:22px;margin:16px 0}
 .big{font-size:20px;font-weight:800}
 .btn{border:none;border-radius:10px;padding:15px 24px;font-size:16px;font-weight:800;cursor:pointer;background:#0E8A4F;color:#fff;text-decoration:none;display:inline-block}
 .muted{color:#5B6573;font-size:13px}.warn{color:#c0392b;font-weight:700}
</style></head>
<body>
 <h1>📤 내 카탈로그 내보내기</h1>
 <p class="muted">지금 이 브라우저(localhost)에 저장된 차량 데이터를 <b>파일로 내보냅니다.</b> 데이터는 <b>읽기만</b> 하고 그대로 둡니다. 내려받은 파일을 사이트에 반영하면 공개 사이트에도 똑같이 보입니다.</p>
 <div class="box" id="info">확인 중…</div>
 <a id="dl" class="btn" style="pointer-events:none;opacity:.5">⬇ 내보내기 (다운로드)</a>
 <div id="status" class="muted" style="margin-top:14px"></div>
<script>
 var raw = localStorage.getItem("cartrend:cars");
 var info=document.getElementById("info"), dl=document.getElementById("dl");
 if(!raw){ info.innerHTML='<span class="warn">이 브라우저(localhost)에 저장된 차량 데이터가 없습니다.</span><div class="muted">localhost:3001/admin.html 에서 등록한 게 맞는지 확인해 주세요.</div>'; }
 else{
   try{
     var a=JSON.parse(raw);
     var ph=a.filter(c=>c.photo).length;
     var det=a.filter(c=>c.detail && (c.detail.vehicleTypes||[]).some(v=>(v.trims||[]).length)).length;
     info.innerHTML='<span class="big">'+a.length+'대</span> 저장돼 있습니다.<br><span class="muted">사진 '+ph+'대 · 트림 입력 '+det+'대</span>';
     var blob=new Blob([raw],{type:"application/json"});
     dl.href=URL.createObjectURL(blob); dl.download="cartrend-catalog.json";
     dl.style.pointerEvents="auto"; dl.style.opacity="1";
     dl.addEventListener("click",function(){ document.getElementById("status").innerHTML="✓ 다운로드됨 → 보통 <b>다운로드 폴더(Downloads)</b>에 <b>cartrend-catalog.json</b> 으로 저장됩니다. 저장됐다고 알려주세요."; });
   }catch(e){ info.innerHTML='<span class="warn">데이터 읽기 오류: '+e+'</span>'; }
 }
</script>
</body></html>
