<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>G80 옵션 적용</title>
<style>
  body{font-family:"Pretendard",system-ui,sans-serif;background:#F7F8FA;color:#1A2332;max-width:680px;margin:0 auto;padding:36px 20px;line-height:1.6}
  .box{background:#fff;border:1px solid #E6E9EE;border-radius:14px;padding:20px;margin:16px 0}
  .g{font-weight:800;margin-top:10px}.it{font-size:13px;color:#5B6573;padding:2px 0}
  .btn{border:none;border-radius:10px;padding:14px 22px;font-size:15px;font-weight:800;cursor:pointer}
  .btn--go{background:#0E8A4F;color:#fff}.btn--go:disabled{background:#9aa3b0}
  .muted{color:#5B6573;font-size:13px}.ok{color:#0E8A4F;font-weight:800}.warn{color:#c0392b}
  #status{margin-top:14px;font-weight:700}
</style></head>
<body>
  <h1>제네시스 G80 · 2.5 터보 스포츠 2WD — 추가옵션 적용</h1>
  <p class="muted">아래 옵션을 <b>그 트림에만</b> 넣습니다. 다른 차량·다른 트림은 그대로 둡니다. (현재 데이터 자동 백업)</p>
  <div class="box" id="preview">불러오는 중…</div>
  <button id="go" class="btn btn--go" disabled>이 트림에 적용</button>
  <a class="btn" href="admin.html" style="background:#fff;border:1.5px solid #E6E9EE;color:#1A2332;text-decoration:none">관리자로</a>
  <div id="status"></div>
<script>
var OPTS=null;
fetch("catalog-all.json?n="+Date.now()).then(r=>r.json()).then(function(cat){
  var g=cat.find(c=>c.name==="제네시스 G80 (RG3 F/L)");
  var tr=null; g.detail.vehicleTypes.forEach(v=>v.trims.forEach(t=>{ if(t.name==="2.5 터보 스포츠 2WD") tr=t; }));
  OPTS=tr.addOptions;
  document.getElementById("preview").innerHTML=OPTS.map(function(grp){
    return '<div class="g">'+grp.title+' ('+grp.items.length+')</div>'+grp.items.map(function(it){return '<div class="it">· '+it.name+(it.price?' +'+it.price.toLocaleString()+'원':' 0원')+'</div>';}).join("");
  }).join("");
  document.getElementById("go").disabled=false;
}).catch(e=>{document.getElementById("preview").innerHTML='<span class="warn">로드 실패: '+e+'</span>';});

document.getElementById("go").addEventListener("click",function(){
  if(!OPTS)return;
  try{
    var cars=JSON.parse(localStorage.getItem("cartrend:cars")||"[]");
    var g=cars.find(c=>c.name==="제네시스 G80 (RG3 F/L)");
    if(!g||!g.detail){ document.getElementById("status").innerHTML='<span class="warn">관리자에 G80이 없습니다. 먼저 loadall로 카탈로그를 불러오세요.</span>'; return; }
    // 쌓인 옛 백업 정리(용량 확보)
    Object.keys(localStorage).filter(function(k){return k.indexOf("cartrend:cars_backup_")===0;}).forEach(function(k){localStorage.removeItem(k);});
    try{ localStorage.setItem("cartrend:cars_backup_"+Date.now(), JSON.stringify(cars)); }catch(e){} // 백업(실패해도 진행)
    var hit=false;
    g.detail.vehicleTypes.forEach(v=>v.trims.forEach(t=>{ if(t.name==="2.5 터보 스포츠 2WD"){ t.addOptions=OPTS; hit=true; } }));
    if(!hit){ document.getElementById("status").innerHTML='<span class="warn">‘2.5 터보 스포츠 2WD’ 트림을 못 찾았습니다.</span>'; return; }
    localStorage.setItem("cartrend:cars", JSON.stringify(cars));
    document.getElementById("status").innerHTML='<span class="ok">✓ 적용 완료! G80 2.5 터보 스포츠 2WD에 옵션 '+OPTS.reduce((s,x)=>s+x.items.length,0)+'개 들어갔습니다. 관리자로 가서 확인하세요.</span>';
  }catch(e){document.getElementById("status").innerHTML='<span class="warn">실패: '+e+'</span>';}
});
</script>
</body></html>
