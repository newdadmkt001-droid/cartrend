<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>차량 상세 · Cartrend 신차장기렌트</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="styles.css" id="mainCss" />
  <script>
    /* 관리자 미리보기(iframe)에서 항상 최신 CSS를 불러오도록 캐시 무력화 */
    (function () {
      var p = new URLSearchParams(location.search);
      if (p.get("preview") === "1") {
        var l = document.getElementById("mainCss");
        if (l) l.href = "styles.css?n=" + (p.get("n") || "0");
      }
    })();
  </script>
</head>
<body>

  <header class="header is-scrolled" id="header">
    <div class="container header__inner">
      <a href="index.html" class="logo" aria-label="Cartrend 홈">
        <span class="logo__tag">장기렌트 전문</span>
        <span class="logo__text"><b>Car</b>trend</span>
      </a>
      <div class="header__actions">
        <a href="index.html" class="btn btn--ghost btn--sm">← 목록</a>
        <a href="tel:15880000" class="btn btn--primary btn--sm">상담신청</a>
      </div>
    </div>
  </header>

  <main class="detail">

    <!-- 본문: PC 2단(좌 정보 / 우 견적 패널) · 모바일 단일 -->
    <div class="dlayout container">
      <div class="dlayout__main">

        <!-- 차량 이미지 (맨 위) -->
        <div class="dcarimg" id="dImg" aria-hidden="true"></div>

        <!-- 차량명 · 가격 -->
        <div class="dtop">
          <div class="dhero__badges" id="dBadges"></div>
          <div class="dtop__row">
            <h1 class="dhero__title" id="dTitle">차량명</h1>
            <div class="dhero__msrp dhero__msrp--under">
              <strong><b id="dMsrp">0</b>만원</strong>
            </div>
          </div>
        </div>

        <!-- 차종/트림 선택 -->
        <section class="dsection dpick__sel">
          <div class="vpills" id="variantList" data-head="vtype"></div>
          <div class="trimgrid" id="trimList"></div>
        </section>

        <!-- 차량정보 (트림 아래) -->
        <section class="dsection">
          <div class="spectabs" id="specTabs">
            <button class="spectab is-active" data-tab="0">차량정보</button>
          </div>
          <div class="spectable" id="specTable"></div>
        </section>

        <!-- 추가 옵션 -->
        <section class="dsection" id="addOptSec" style="display:none">
          <div class="aopt-head">
            <h2 class="dsection__title"><span>추가 옵션</span></h2>
            <span class="aopt-total">총합 <b id="addOptTotal">0원</b></span>
          </div>
          <div id="addOptRows"></div>
        </section>

        <!-- 트림 포함 사양 -->
        <section class="dsection" id="trimFeatSec" style="display:none">
          <h2 class="dsection__title"><span>트림 포함 사양 · 옵션</span></h2>
          <div class="maintbox"><ul class="maintbox__list" id="trimFeat"></ul></div>
        </section>

        <!-- 정비 서비스 -->
        <section class="dsection">
          <h2 class="dsection__title dsection__title--noline"><span>정비 서비스</span></h2>
          <div class="maintbox">
            <p class="maintbox__lead">기본 제공 서비스</p>
            <ul class="maintbox__list" id="maintList"></ul>
            <p class="maintbox__fee" id="maintFee"></p>
          </div>
        </section>

        <!-- 계약 조건 -->
        <section class="dsection">
          <h2 class="dsection__title"><span>계약 조건</span></h2>
          <div class="inforows" id="infoRows"></div>
        </section>

      </div>

      <!-- 견적 사이드(PC sticky) -->
      <aside class="dlayout__side">
        <div class="qpanel">
          <div class="qpanel__pay">
            <span class="qpanel__label">월 납입금</span>
            <strong><b id="payTotalSide">000,000</b>원</strong>
            <span class="qpanel__sub" id="paySubSide"></span>
            <span class="qpanel__vat">부가세 포함</span>
          </div>
          <div class="qpanel__termhead">계약 기간 선택</div>
          <div class="termlist" id="termList"></div>
          <div class="qpanel__cta">
            <a href="#" class="btn btn--line">💬 카톡 상담</a>
            <a href="tel:15880000" class="btn btn--primary">즉시 출고 문의</a>
          </div>
        </div>
      </aside>
    </div>

  </main>

  <!-- 하단 견적 바 -->
  <div class="paybar">
    <div class="container paybar__inner">
      <div class="paybar__price">
        <span class="paybar__label">월 납입금</span>
        <strong><b id="payTotal">000,000</b>원</strong>
        <span class="paybar__sub" id="paySub"></span>
      </div>
      <div class="paybar__btns">
        <a href="#" class="btn btn--line">💬 카톡 상담</a>
        <a href="tel:15880000" class="btn btn--primary">즉시 출고 문의</a>
      </div>
    </div>
  </div>

  <!-- 옵션 선택 바텀시트 -->
  <div class="sheet" id="sheet" aria-hidden="true">
    <div class="sheet__dim" id="sheetDim"></div>
    <div class="sheet__panel">
      <div class="sheet__head"><b id="sheetTitle"></b></div>
      <div class="sheet__body" id="sheetBody"></div>
      <button class="sheet__close" id="sheetClose">닫기</button>
    </div>
  </div>

  <script src="lib/quote-engine.js"></script>
  <script src="data.js"></script>
  <script src="car.js"></script>
</body>
</html>
